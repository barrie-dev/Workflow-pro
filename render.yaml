# WorkFlow Pro – Render.com deployment config
# https://render.com/docs/blueprint-spec
#
# Deploy: koppel je GitHub-repo aan Render en kies "Blueprint".
# Render leest dit bestand en maakt automatisch de service aan.
# Stel daarna de ENV-vars in via het Render-dashboard (zie .env.production.example).

services:
  - type: web
    name: workflowpro
    runtime: node
    region: frankfurt          # dichtstbij België/Nederland
    plan: starter              # upgrade naar standard voor productie-SLA
    buildCommand: npm install --omit=dev
    # Migraties als expliciete stap VOOR de app start (zelfde volgorde als de
    # container en de RUNBOOK). De advisory lock in de runner maakt dit ook
    # veilig wanneer meerdere instanties tegelijk deployen.
    startCommand: node scripts/run-migrations.js && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RELEASE_CHANNEL
        value: production
      - key: PORT
        value: "10000"         # Render injecteert PORT automatisch; dit is de default
      - key: STORAGE_ADAPTER
        value: postgres        # gebruik postgres in productie, niet json
      - key: REQUIRE_ADMIN_MFA
        value: "true"          # MFA verplicht in productie
      # Secrets: vul in via Render dashboard of koppel aan Render Secret Groups
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # LEGACY · alleen nog voor de eenmalige data-overname en het rollback-pad
      # (STORAGE_ADAPTER=supabase). Verwijderen zodra de retentieperiode van de
      # cutover voorbij is; nieuwe omgevingen hebben deze NIET nodig.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PEPPOL_PROVIDER
        sync: false
      - key: PEPPOL_API_KEY
        sync: false
      - key: WORKFLOWPRO_INITIAL_ADMIN_EMAIL
        sync: false
      - key: WORKFLOWPRO_INITIAL_ADMIN_PASSWORD
        sync: false
      - key: WORKFLOWPRO_INITIAL_ADMIN_NAME
        sync: false
      # ── Managed object storage (CTO2-11) · Supabase Storage is S3-compatibel,
      # dus de generieke s3-adapter werkt zonder codewijziging. Structurele
      # waarden staan hier vast; de project-specifieke waarden en de S3-secrets
      # vul je in het Render-dashboard in (sync: false → dashboard is de bron).
      # 'local' is in productie verboden (de boot faalt hard) · bestanden moeten
      # een deploy overleven. Zie docs/DEPLOY-RUNBOOK.md §CTO2.
      - key: OBJECT_STORAGE_ADAPTER
        value: s3
      - key: OBJECT_STORAGE_PATH_STYLE
        value: "true"
      # https://<project-ref>.storage.supabase.co/storage/v1/s3
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      # Private bucket (nooit public · toegang via ondertekende URL).
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_REGION
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
