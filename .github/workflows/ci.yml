name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + integratie tegen een ECHTE PostgreSQL (CTO P0-02/P0-06) ─────────
  # Zonder database bewijzen unit tests geen tenant- of migratiegedrag: de
  # DB-gebonden tests (pg-adapter-contract, RLS/cross-tenant, jobqueue,
  # CRM-backfill/reconciliatie) sloegen dan stil over. Hier draaien ze echt.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monargo
          POSTGRES_PASSWORD: monargo
          POSTGRES_DB: monargo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monargo -d monargo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://monargo:monargo@localhost:5432/monargo
      # s3-compatibele opslag (P0-08): de live contracttest draait tegen een
      # zelfgehoste server · zelfde protocol als elke aanbieder, nul lock-in.
      S3_TEST_ENDPOINT: http://localhost:9000
      S3_TEST_ACCESS_KEY: monargo
      S3_TEST_SECRET_KEY: monargo123
      # Blob-opslag (Azure-productiepad): live tegen Azurite, de officiële
      # emulator met dezelfde handtekeningvalidatie als de echte dienst.
      AZURE_TEST_ENDPOINT: http://localhost:10000/devstoreaccount1
    steps:
      - uses: actions/checkout@v4
      - name: Start s3-compatibele opslag (zelfgehost, voor de live objectopslag-tests)
        run: |
          docker run -d --name storage -p 9000:9000 \
            -e MINIO_ROOT_USER=monargo -e MINIO_ROOT_PASSWORD=monargo123 \
            quay.io/minio/minio server /data
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then echo "opslag gezond"; exit 0; fi
            sleep 2
          done
          echo "::error::Objectopslag werd niet gezond"; exit 1
      - name: Start blob-opslag-emulator (Azure-productiepad, live contracttest)
        run: |
          docker run -d --name storage-azure -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite azurite-blob --blobHost 0.0.0.0
          for i in $(seq 1 20); do
            if curl -s -o /dev/null http://localhost:10000/devstoreaccount1; then echo "emulator bereikbaar"; exit 0; fi
            sleep 2
          done
          echo "::error::Blob-emulator werd niet bereikbaar"; exit 1
      - name: Setup Node.js 22 (enige runtime · CI = Docker = Azure)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --omit=dev
      - name: Syntax check (src)
        run: npm run check
      - name: Migratiegate · toepassen op lege database
        run: node scripts/run-migrations.js
      - name: Migratiegate · idempotentie (tweede run wijzigt niets)
        run: |
          node scripts/run-migrations.js
          node scripts/run-migrations.js --status --json | node -e "
            const st = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            if (st.pending.length) { console.error('Openstaande migraties na run:', st.pending); process.exit(1); }
            console.log('Migraties toegepast en idempotent:', st.applied.length + '/' + st.total);
          "
      - name: Tests incl. database-integratie en tenant-isolatie
        # DATABASE_URL staat, dus de DB-tests draaien ECHT · de suite faalt
        # hard op databasefouten in plaats van stil over te slaan. pipefail
        # zodat tee een falende suite niet maskeert.
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/test-out.txt
      - name: Bewijs · geen overgeslagen database- of opslagtests
        run: |
          if grep -q "DATABASE_URL niet gezet" /tmp/test-out.txt; then
            echo "::error::Database-tests werden overgeslagen terwijl DATABASE_URL gezet is"; exit 1;
          fi
          if grep -q "S3_TEST_ENDPOINT niet gezet" /tmp/test-out.txt; then
            echo "::error::Objectopslag-tests werden overgeslagen terwijl de opslag draait"; exit 1;
          fi
          if grep -q "AZURE_TEST_ENDPOINT niet gezet" /tmp/test-out.txt; then
            echo "::error::Blob-opslagtests werden overgeslagen terwijl de emulator draait"; exit 1;
          fi
          echo "Alle database- en opslag-gebonden tests hebben echt gedraaid."

  # ── E2E-scenario's (CTO DEV-02): verplicht ná unit/integratie, vóór de
  # containersmoke/release. Elke smoke krijgt een verse, geïsoleerde dataset op
  # de JSON-adapter. Faalt de suite, dan wordt er niet gebouwd of vrijgegeven.
  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22 (enige runtime · CI = Docker = Azure)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --omit=dev
      - name: E2E-suite (verse dataset per scenario)
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee /tmp/e2e-out.txt
      - name: Roadmap-gate (DEV-01) · draai + matrix als evidence
        # De gate is bewust ROOD tot de kern sluit (cutover/tx/e2e). We draaien
        # hem zichtbaar en bewaren de matrix; hij wordt een HARDE gate zodra hij
        # groen is. Daarom hier niet-blokkerend (|| true).
        run: |
          node scripts/generate-traceability.js
          node scripts/check-roadmap-status.js || true
      - name: Upload E2E- en traceability-evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-and-traceability
          path: |
            /tmp/e2e-out.txt
            docs/traceability/matrix.json
            docs/traceability/matrix.md

  # ── Containersmoke (CTO P0-01/P0-05): het gedocumenteerde standaardpad ─────
  # Bouw de echte image, start db + app via compose (incl. migratiestap in de
  # container) en bewijs health + readiness vanaf een LEGE database.
  container-smoke:
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      - name: Compose build + start (leeg → migraties → app)
        run: docker compose up -d --build
      - name: Wacht op health
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4280/api/health || true)
            if [ "$status" = "200" ]; then echo "health OK na ${i} pogingen"; exit 0; fi
            sleep 3
          done
          echo "::error::App werd niet gezond binnen 90s"
          docker compose logs app | tail -50
          exit 1
      - name: Readiness + opslagcontrole
        run: |
          curl -sf http://localhost:4280/api/ready | tee /tmp/ready.json
          node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/ready.json', 'utf8'));
            if (!r.ok || r.checks.storageAdapter !== 'postgres') { console.error('Readiness faalt of draait niet op postgres:', r); process.exit(1); }
            console.log('Container draait gezond op de pg-adapter · revision', r.store.revision);
          "
      - name: Herstart-smoke (data overleeft een containerrestart)
        run: |
          docker compose restart app
          sleep 5
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4280/api/health || true)
            if [ "$status" = "200" ]; then echo "herstart OK"; exit 0; fi
            sleep 3
          done
          echo "::error::App kwam niet terug na herstart"; exit 1
      - name: Opruimen
        if: always()
        run: docker compose down -v
