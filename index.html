<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="WorkFlow Pro - SaaS platform voor Belgische KMO's met veldpersoneel."/>
  <meta name="theme-color" content="#0F172A"/>
  <title>WorkFlow Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F6F5F1; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: Arial, sans-serif; color: #6B6760;
      flex-direction: column; gap: 14px;
    }
    .sp {
      width: 36px; height: 36px;
      border: 3px solid #E8E4DC;
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="sp"></div>
    <div style="font-weight:700;font-size:16px">WorkFlow Pro</div>
    <div style="font-size:12px;color:#A09890">Laden...</div>
  </div>
  <div id="root"></div>

  <script>
    function showError(e) {
      document.getElementById('loading').innerHTML =
        '<div style="color:#DC2626;padding:30px;text-align:center;font-family:Arial">' +
        '<div style="font-size:28px;margin-bottom:10px">⚠️</div>' +
        '<strong>Laadprobleem</strong><br><br>' +
        '<div style="font-size:13px;color:#6B6760">' + e.message + '</div>' +
        '</div>';
      console.error(e);
    }
    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = function() { reject(new Error('Kon ' + src + ' niet laden')); };
        document.body.appendChild(script);
      });
    }
    var assetRoot = location.protocol === 'file:' ? '' : '/';
    loadScript(assetRoot + 'react-all.js')
      .then(function() { return loadScript(assetRoot + 'app.js'); })
      .then(function() {
        document.getElementById('loading').style.display = 'none';
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(App)
        );
      })
      .catch(showError);
  </script>
</body>
</html>
